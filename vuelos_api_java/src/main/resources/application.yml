server:
  port: 8080

spring:
  profiles:
    active: h2
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

app:
  cors:
    allowed-origins: http://localhost:4200,http://127.0.0.1:4200

logging:
  level:
    org.hibernate.SQL: INFO
